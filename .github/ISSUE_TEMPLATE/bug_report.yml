name: Bug report
description: Report a reproducible NetWatcher problem
title: "[Bug]: "
labels: [bug]
body:
  - type: input
    id: version
    attributes:
      label: NetWatcher version
      placeholder: 2.1.3
    validations:
      required: true
  - type: dropdown
    id: windows
    attributes:
      label: Windows version
      options: [Windows 11, Windows 10, Other]
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Explain exactly what happened and how to reproduce it.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Remove personal information before uploading.

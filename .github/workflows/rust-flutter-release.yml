name: NetWatcher Stable Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Stable version without the v prefix"
        required: true
        default: "4.0.4"

permissions:
  contents: read

jobs:
  windows-stable-build:
    runs-on: windows-2022
    timeout-minutes: 60
    defaults:
      run:
        shell: pwsh

    steps:
      - uses: actions/checkout@v5

      - name: Resolve stable version
        run: |
          $version = "${{ inputs.version }}".TrimStart("v")
          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            throw "Stable version must use x.y.z format: $version"
          }
          "RELEASE_VERSION=$version" |
            Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          "RELEASE_TAG=v$version" |
            Out-File $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install Flutter stable
        run: |
          git clone --depth 1 --branch stable https://github.com/flutter/flutter.git C:\flutter
          "C:\flutter\bin" | Out-File $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Configure Rust and Flutter
        run: |
          rustup update stable
          rustup default stable
          flutter config --enable-windows-desktop
          flutter --version
          flutter doctor -v
          rustc --version
          cargo --version

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build and test stable assets
        run: .\scripts\build-stable-release.ps1 -Version "${env:RELEASE_VERSION}"

      - name: Upload stable build artifact
        uses: actions/upload-artifact@v4
        with:
          name: NetWatcher-${{ env.RELEASE_TAG }}-Windows
          path: |
            dist/*.exe
            dist/*.zip
            dist/*.sha256
          if-no-files-found: error

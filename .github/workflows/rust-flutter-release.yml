name: NetWatcher Stable Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: "Stable version without the v prefix"
        required: true
        default: "4.0.4"

permissions:
  contents: read

concurrency:
  group: netwatcher-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'push' }}

jobs:
  test:
    name: Test Rust and Flutter
    runs-on: windows-2022
    timeout-minutes: 45

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Install Flutter stable
        run: |
          git clone --depth 1 --branch stable https://github.com/flutter/flutter.git C:\flutter
          "C:\flutter\bin" |
            Out-File $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Configure Rust and Flutter
        run: |
          rustup update stable
          rustup default stable
          flutter config --enable-windows-desktop
          flutter --version
          flutter doctor -v
          rustc --version
          cargo --version

      - name: Prepare Flutter Windows runner
        run: .\scripts\prepare-flutter-windows.ps1

      - name: Run Rust and Flutter checks
        run: .\scripts\test-rust-flutter.ps1

  release:
    name: Build and publish stable Windows release
    if: github.event_name == 'workflow_dispatch'
    needs:
      - test
    runs-on: windows-2022
    timeout-minutes: 75

    permissions:
      contents: write

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout source
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve and validate stable version
        run: |
          $version = "${{ inputs.version }}".Trim().TrimStart("v")

          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            throw "Stable version must use x.y.z format: $version"
          }

          if ("${{ github.ref_name }}" -ne "main") {
            throw "Stable releases must be started from the main branch."
          }

          $notes = "RELEASE_NOTES_$version.md"
          if (-not (Test-Path $notes)) {
            throw "Release notes file was not found: $notes"
          }

          "RELEASE_VERSION=$version" |
            Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          "RELEASE_TAG=v$version" |
            Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          "RELEASE_NOTES=$notes" |
            Out-File $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install Flutter stable
        run: |
          git clone --depth 1 --branch stable https://github.com/flutter/flutter.git C:\flutter
          "C:\flutter\bin" |
            Out-File $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Configure Rust and Flutter
        run: |
          rustup update stable
          rustup default stable
          flutter config --enable-windows-desktop
          flutter --version
          flutter doctor -v
          rustc --version
          cargo --version
          gh --version

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build stable assets
        run: .\scripts\build-stable-release.ps1 -Version "${env:RELEASE_VERSION}"

      - name: Verify stable assets
        run: |
          $required = @(
            ".\dist\NetWatcher_Setup_${env:RELEASE_VERSION}.exe",
            ".\dist\NetWatcher_Setup_${env:RELEASE_VERSION}.exe.sha256",
            ".\dist\NetWatcher_${env:RELEASE_VERSION}_Windows_Portable.zip",
            ".\dist\NetWatcher_${env:RELEASE_VERSION}_Windows_Portable.zip.sha256"
          )

          foreach ($path in $required) {
            if (-not (Test-Path $path)) {
              throw "Required stable release asset was not produced: $path"
            }
          }

      - name: Upload stable workflow backup
        uses: actions/upload-artifact@v4
        with:
          name: NetWatcher-${{ env.RELEASE_TAG }}-Windows-Stable
          path: |
            dist/*.exe
            dist/*.zip
            dist/*.sha256
          if-no-files-found: error

      - name: Create or verify stable tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          $tag = "${env:RELEASE_TAG}"
          $tagLine = git ls-remote --exit-code --tags origin "refs/tags/$tag" 2>$null
          $lookupExit = $LASTEXITCODE

          if ($lookupExit -eq 0 -and $tagLine) {
            $peeledLine = git ls-remote --tags origin "refs/tags/$tag^{}"
            if ($peeledLine) {
              $tagCommit = ($peeledLine -split '\s+')[0]
            } else {
              $tagCommit = ($tagLine -split '\s+')[0]
            }

            if ($tagCommit.ToLowerInvariant() -ne "${env:GITHUB_SHA}".ToLowerInvariant()) {
              throw "Tag $tag already exists on another commit: $tagCommit"
            }

            Write-Host "Tag $tag already points to this workflow commit."
          } elseif ($lookupExit -eq 2) {
            git tag -a "$tag" "${env:GITHUB_SHA}" -m "NetWatcher ${env:RELEASE_VERSION}"
            if ($LASTEXITCODE -ne 0) {
              throw "Stable tag creation failed."
            }

            git push origin "refs/tags/$tag"
            if ($LASTEXITCODE -ne 0) {
              throw "Stable tag push failed."
            }
          } else {
            throw "Could not check whether tag $tag exists."
          }

      - name: Publish GitHub stable release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $assets = @(
            Get-ChildItem .\dist -File |
              Where-Object {
                $_.Name -like "*.exe" -or
                $_.Name -like "*.zip" -or
                $_.Name -like "*.sha256"
              } |
              ForEach-Object { $_.FullName }
          )

          if ($assets.Count -lt 4) {
            throw "Stable release assets are incomplete."
          }

          gh release view "${env:RELEASE_TAG}" `
            --repo "${env:GITHUB_REPOSITORY}" *> $null
          $releaseExists = $LASTEXITCODE -eq 0

          if ($releaseExists) {
            gh release upload "${env:RELEASE_TAG}" @assets `
              --repo "${env:GITHUB_REPOSITORY}" `
              --clobber

            if ($LASTEXITCODE -ne 0) {
              throw "Existing release asset upload failed."
            }

            gh release edit "${env:RELEASE_TAG}" `
              --repo "${env:GITHUB_REPOSITORY}" `
              --title "NetWatcher ${env:RELEASE_VERSION}" `
              --notes-file "${env:RELEASE_NOTES}" `
              --latest

            if ($LASTEXITCODE -ne 0) {
              throw "Existing stable release update failed."
            }
          } else {
            gh release create "${env:RELEASE_TAG}" @assets `
              --repo "${env:GITHUB_REPOSITORY}" `
              --verify-tag `
              --title "NetWatcher ${env:RELEASE_VERSION}" `
              --notes-file "${env:RELEASE_NOTES}" `
              --latest

            if ($LASTEXITCODE -ne 0) {
              throw "GitHub stable release publication failed."
            }
          }

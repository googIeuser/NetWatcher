name: NetWatcher CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "flutter_app/**"
      - "rust_core/**"
      - "scripts/**"
      - "installer/**"
      - ".github/workflows/**"
  pull_request:
    branches:
      - main
    paths:
      - "flutter_app/**"
      - "rust_core/**"
      - "scripts/**"
      - "installer/**"
      - ".github/workflows/**"

permissions:
  contents: read

concurrency:
  group: netwatcher-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows-ci:
    name: Test Rust and Flutter
    runs-on: windows-2022
    timeout-minutes: 45

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Install Flutter stable
        run: |
          git clone --depth 1 --branch stable https://github.com/flutter/flutter.git C:\flutter
          "C:\flutter\bin" |
            Out-File $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Configure Rust and Flutter
        run: |
          rustup update stable
          rustup default stable
          flutter config --enable-windows-desktop
          flutter --version
          flutter doctor -v
          rustc --version
          cargo --version

      - name: Prepare Flutter Windows runner
        run: .\scripts\prepare-flutter-windows.ps1

      - name: Run Rust and Flutter checks
        run: .\scripts\test-rust-flutter.ps1

name: Release

on:
  push:
    tags:
      - "v*"
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the v prefix"
        required: true
        default: "2.1.0"

permissions:
  contents: write

jobs:
  release:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[release]')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Resolve and validate version
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like "refs/tags/v*") {
            $version = "${env:GITHUB_REF_NAME}".TrimStart("v")
          } elseif ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ inputs.version }}".TrimStart("v")
          } else {
            $version = "2.1.0"
          }
          $match = Select-String -Path main.go -Pattern 'appVersion\s*=\s*"([^"]+)"'
          $sourceVersion = $match.Matches[0].Groups[1].Value
          if ($sourceVersion -ne $version) { throw "Requested version $version does not match appVersion $sourceVersion" }
          "RELEASE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RELEASE_TAG=v$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          go test ./...

      - name: Build setup executable
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $ldflags = "-s -w -H=windowsgui -X main.githubRepository=${env:GITHUB_REPOSITORY}"
          go build -trimpath -ldflags $ldflags -o "dist\NetWatcher_Setup_${env:RELEASE_VERSION}.exe" .

      - name: Optionally sign executable
        shell: pwsh
        env:
          CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:CERTIFICATE_BASE64) -or [string]::IsNullOrWhiteSpace($env:CERTIFICATE_PASSWORD)) {
            Write-Host "Signing secrets are not configured; publishing an unsigned build."
            exit 0
          }
          $cert = Join-Path $env:RUNNER_TEMP "netwatcher-signing.pfx"
          [IO.File]::WriteAllBytes($cert, [Convert]::FromBase64String($env:CERTIFICATE_BASE64))
          & .\scripts\sign-release.ps1 -File "dist\NetWatcher_Setup_${env:RELEASE_VERSION}.exe" -CertificatePath $cert -CertificatePassword $env:CERTIFICATE_PASSWORD
          Remove-Item $cert -Force

      - name: Generate checksum
        shell: pwsh
        run: |
          $file = "dist\NetWatcher_Setup_${env:RELEASE_VERSION}.exe"
          $hash = (Get-FileHash $file -Algorithm SHA256).Hash.ToLower()
          "$hash  NetWatcher_Setup_${env:RELEASE_VERSION}.exe" | Set-Content "$file.sha256" -Encoding ascii

      - uses: actions/upload-artifact@v7
        with:
          name: NetWatcher-${{ env.RELEASE_TAG }}
          path: |
            dist/*.exe
            dist/*.sha256
          if-no-files-found: error

      - name: Create or update GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $exists = gh release view "${env:RELEASE_TAG}" 2>$null
          if ($LASTEXITCODE -eq 0) {
            gh release upload "${env:RELEASE_TAG}" dist/*.exe dist/*.sha256 --clobber
          } else {
            gh release create "${env:RELEASE_TAG}" dist/*.exe dist/*.sha256 --target "${env:GITHUB_SHA}" --generate-notes --title "NetWatcher ${env:RELEASE_TAG}"
          }

name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Test with race detector
        run: go test -race ./...
      - name: Vet
        run: go vet ./...
      - name: Cross-build Windows AMD64
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: 0
        run: go build -trimpath -ldflags="-s -w -H=windowsgui" -o dist/NetWatcher_Setup_CI.exe .
      - uses: actions/upload-artifact@v7
        with:
          name: NetWatcher-Windows-CI
          path: dist/NetWatcher_Setup_CI.exe
          if-no-files-found: error

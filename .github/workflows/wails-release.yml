name: NetWatcher 3 Stable Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Stable version without the v prefix"
        required: true
        default: "3.0.0"
  push:
    tags:
      - "v3.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: next/go.mod
          cache: false

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: next/frontend/package-lock.json

      - name: Resolve and validate stable version
        run: |
          if ($env:GITHUB_REF -like "refs/tags/v*") {
            $version = "${env:GITHUB_REF_NAME}".TrimStart("v")
          } else {
            $version = "${{ inputs.version }}".TrimStart("v")
          }
          if ($version -match '-') { throw "Stable releases cannot contain a prerelease suffix: $version" }
          $match = Select-String -Path next/app.go -Pattern 'appVersion\s*=\s*"([^"]+)"'
          if (-not $match) { throw "appVersion was not found in next/app.go" }
          $sourceVersion = $match.Matches[0].Groups[1].Value
          if ($sourceVersion -ne $version) { throw "Requested version $version does not match appVersion $sourceVersion" }
          $wailsVersion = (Get-Content next/wails.json -Raw | ConvertFrom-Json).info.productVersion
          if ($wailsVersion -ne $version) { throw "Requested version $version does not match Wails productVersion $wailsVersion" }
          "RELEASE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RELEASE_TAG=v$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install Wails and NSIS
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
          choco install nsis -y --no-progress
          (Join-Path (go env GOPATH) "bin") | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          $nsis = @("C:\Program Files (x86)\NSIS", "C:\Program Files\NSIS") | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $nsis) { throw "NSIS installation path was not found." }
          $nsis | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build and test frontend
        working-directory: next/frontend
        run: |
          npm ci
          npm run build

      - name: Validate Go core
        working-directory: next
        run: |
          go mod tidy
          go vet ./internal/...
          go test ./internal/...

      - name: Build stable Windows installer
        working-directory: next
        run: wails build -nsis

      - name: Prepare release assets
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $installer = Get-ChildItem next/build/bin -Filter "*installer.exe" | Select-Object -First 1
          if (-not $installer) { throw "Wails NSIS installer was not produced." }
          $output = "dist\NetWatcher_Setup_${env:RELEASE_VERSION}.exe"
          Copy-Item $installer.FullName $output -Force
          $hash = (Get-FileHash $output -Algorithm SHA256).Hash.ToLower()
          "$hash  NetWatcher_Setup_${env:RELEASE_VERSION}.exe" | Set-Content "$output.sha256" -Encoding ascii

      - name: Optionally sign installer
        env:
          CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:CERTIFICATE_BASE64) -or [string]::IsNullOrWhiteSpace($env:CERTIFICATE_PASSWORD)) {
            Write-Host "Signing secrets are not configured; publishing an unsigned build."
            exit 0
          }
          $cert = Join-Path $env:RUNNER_TEMP "netwatcher-signing.pfx"
          [IO.File]::WriteAllBytes($cert, [Convert]::FromBase64String($env:CERTIFICATE_BASE64))
          & .\scripts\sign-release.ps1 -File "dist\NetWatcher_Setup_${env:RELEASE_VERSION}.exe" -CertificatePath $cert -CertificatePassword $env:CERTIFICATE_PASSWORD
          Remove-Item $cert -Force
          $hash = (Get-FileHash "dist\NetWatcher_Setup_${env:RELEASE_VERSION}.exe" -Algorithm SHA256).Hash.ToLower()
          "$hash  NetWatcher_Setup_${env:RELEASE_VERSION}.exe" | Set-Content "dist\NetWatcher_Setup_${env:RELEASE_VERSION}.exe.sha256" -Encoding ascii

      - uses: actions/upload-artifact@v7
        with:
          name: NetWatcher-${{ env.RELEASE_TAG }}
          path: |
            dist/*.exe
            dist/*.sha256
          if-no-files-found: error

      - name: Publish latest stable GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $notes = "RELEASE_NOTES_${env:RELEASE_VERSION}.md"
          if (-not (Test-Path $notes)) { throw "Release notes were not found: $notes" }
          gh release view "${env:RELEASE_TAG}" 2>$null
          if ($LASTEXITCODE -eq 0) {
            gh release upload "${env:RELEASE_TAG}" dist/*.exe dist/*.sha256 --clobber
            gh release edit "${env:RELEASE_TAG}" --title "NetWatcher ${env:RELEASE_VERSION}" --notes-file $notes --latest
          } else {
            gh release create "${env:RELEASE_TAG}" dist/*.exe dist/*.sha256 --target "${env:GITHUB_SHA}" --title "NetWatcher ${env:RELEASE_VERSION}" --notes-file $notes --latest
          }
